<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Blockchain Certification</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0d1b3d, #1b2f6b);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

.container {
    max-width: 700px;
    padding: 40px 20px;
}

.card {
    background: #2a3f7d;
    padding: 50px 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.checkmark {
    font-size: 70px;
    color: #FFD400;
    margin-bottom: 20px;
}

h1 {
    font-size: 40px;
    font-weight: 800;
}

.highlight {
    color: #FFD400;
}

p {
    margin-top: 15px;
    font-size: 18px;
    color: #dcdcdc;
    line-height: 1.6;
}

.info-box {
    margin-top: 25px;
    background: rgba(255, 212, 0, 0.1);
    padding: 15px;
    border-radius: 10px;
    font-size: 16px;
}

.btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 30px;
    background: #FFD400;
    color: #000;
    border-radius: 30px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #ffc400;
}

@media (max-width: 768px) {
    h1 {
        font-size: 28px;
    }
    p {
        font-size: 16px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="checkmark">✓</div>

        <h1>Application <span class="highlight">Submitted Successfully!</span></h1>

        <p>
            Thank you for applying for the <strong>Blockchain Certification Program</strong>.
            Our team will contact you shortly with the next steps.
        </p>

       
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</div>

</html>
